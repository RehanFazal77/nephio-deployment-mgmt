# Network CRs
# Define the VPC networks used by OAI-RAN and SD-Core
# Apply BEFORE any PackageVariants
---
apiVersion: infra.nephio.org/v1alpha1
kind: Network
metadata:
  name: vpc-ran
spec:
  topology: nephio
  routingTables:
  - name: vpc-ran
    prefixes:
    - prefix: 172:2::/32
      labels:
        nephio.org/network-name: n2
    - prefix: 172.2.0.0/16
      labels:
        nephio.org/network-name: n2
    - prefix: 172:3::/32
      labels:
        nephio.org/network-name: n3
    - prefix: 172.3.0.0/16
      labels:
        nephio.org/network-name: n3
    # Per-cluster labels (add one block per cluster)
    - prefix: 172.2.0.0/16
      labels:
        nephio.org/network-name: n2
        nephio.org/cluster-name: ran
    - prefix: 172.3.0.0/16
      labels:
        nephio.org/network-name: n3
        nephio.org/cluster-name: ran
    - prefix: 172.2.0.0/16
      labels:
        nephio.org/network-name: n2
        nephio.org/cluster-name: core
    - prefix: 172.3.0.0/16
      labels:
        nephio.org/network-name: n3
        nephio.org/cluster-name: core
    interfaces:
    - kind: bridgedomain
      bridgeDomainName: vpc-ran
  bridgeDomains:
  - name: vpc-ran
    interfaces:
    - kind: interface
      selector:
        matchExpressions:
        - {key: nephio.org/cluster-name, operator: Exists}
---
