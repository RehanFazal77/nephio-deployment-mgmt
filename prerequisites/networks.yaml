apiVersion: infra.nephio.org/v1alpha1
kind: Network
metadata:
  name: vpc-internet
spec:
  topology: nephio
  routingTables:
  - name: vpc-internet
    prefixes:
    - prefix: 172:6::/32
      labels:
        nephio.org/network-name: n3
    - prefix: 172.6.0.0/16
      labels:
        nephio.org/network-name: n3
    - prefix: 172:0::/32
      labels:
        nephio.org/network-name: n6
    - prefix: 172.0.0.0/16
      labels:
        nephio.org/network-name: n6
    - prefix: 172.0.0.0/16
