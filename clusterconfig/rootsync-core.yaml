# RootSync for SD-Core workload cluster
# Creates a GitOps sync between the downstream Git repo and the core cluster.
# Config Sync watches this repo and applies rendered packages to the cluster.
#
# Apply on the Core workload cluster:
#   kubectl apply -f rootsync-core.yaml --kubeconfig core.kubeconfig
---
apiVersion: configsync.gke.io/v1beta1
kind: RootSync
metadata:
  name: root-sync
  namespace: config-management-system
spec:
  sourceFormat: unstructured
  git:
    repo: https://github.com/YOUR-ORG/nephio-core.git  # ← Change to your downstream repo
    branch: main
    dir: /
    auth: none
    period: 15s
