# Downstream repository registrations
# These are the per-cluster Git repos where rendered packages are synced
---
# OAI-RAN cluster downstream repo
apiVersion: config.porch.kpt.dev/v1alpha1
kind: Repository
metadata:
  name: ran
spec:
  type: git
  content: Package
  deployment: true
  git:
    repo: https://github.com/YOUR-ORG/nephio-ran.git
    branch: main
    directory: /
---
# SD-Core cluster downstream repo
apiVersion: config.porch.kpt.dev/v1alpha1
kind: Repository
metadata:
  name: core
spec:
  type: git
  content: Package
  deployment: true
  git:
    repo: https://github.com/YOUR-ORG/nephio-core.git
    branch: main
    directory: /
