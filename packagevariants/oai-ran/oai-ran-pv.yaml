# OAI CUCP (CU Control Plane)
# Interfaces: E1, F1-C, N2 — each mapped to a physical NIC
apiVersion: config.porch.kpt.dev/v1alpha1
kind: PackageVariant
metadata:
  name: oai-cucp-ran
spec:
  upstream:
    repo: nephio-workload-blueprints
    package: workloads/oai-ran/oai-ran/pkg-example-cucp-bp
  downstream:
    repo: ran
    package: oai-ran-cucp
  annotations:
    approval.nephio.org/policy: initial
  pipeline:
    mutators:
      - image: ghcr.io/kptdev/krm-functions-catalog/apply-setters:v0.2
        configMap:
          e1-interface: eno49     # ← Physical NIC for E1 (CUCP ↔ CUUP)
          f1c-interface: eno49    # ← Physical NIC for F1-C (CUCP ↔ DU)
          n2-interface: eno49     # ← Physical NIC for N2 (CUCP → AMF)
  injectors:
  - group: infra.nephio.org
    version: v1alpha1
    kind: WorkloadCluster
    name: ran
---
# OAI CUUP (CU User Plane)
# Interfaces: E1, F1-U, N3 — each mapped to a physical NIC
apiVersion: config.porch.kpt.dev/v1alpha1
kind: PackageVariant
metadata:
  name: oai-cuup-ran
spec:
