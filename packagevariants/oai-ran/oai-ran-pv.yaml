  downstream:
    repo: ran
    package: oai-ran-cuup
  annotations:
    approval.nephio.org/policy: initial
  pipeline:
    mutators:
      - image: ghcr.io/kptdev/krm-functions-catalog/apply-setters:v0.2
        configMap:
          e1-interface: eno49     # ← Physical NIC for E1 (CUUP ↔ CUCP)
          f1u-interface: eno49    # ← Physical NIC for F1-U (CUUP ↔ DU)
          n3-interface: eno49     # ← Physical NIC for N3 (CUUP → UPF)
  injectors:
  - group: infra.nephio.org
    version: v1alpha1
    kind: WorkloadCluster
    name: ran
---
