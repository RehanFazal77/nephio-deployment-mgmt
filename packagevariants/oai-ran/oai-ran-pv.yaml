# OAI CP Operators (CRDs only — NO actual core NFs)
# Required for NFDeployment CRD used by RAN NFs
apiVersion: config.porch.kpt.dev/v1alpha1
kind: PackageVariant
metadata:
  name: oai-cp-operators-ran
spec:
  upstream:
    repo: nephio-workload-blueprints
    package: workloads/oai-ran/oai-ran/oai-cp-operators
  downstream:
    repo: ran
    package: oai-cp-operators
  annotations:
    approval.nephio.org/policy: initial
  injectors:
  - group: infra.nephio.org
    version: v1alpha1
    kind: WorkloadCluster
    name: ran
